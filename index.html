<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvolutionPad</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
    onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js'"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
    onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js'"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"
    onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.4/babel.min.js'"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f0f11;--surface:#17171a;--surface2:#1f1f24;--border:#2a2a32;
      --accent:#7c6af7;--accent-dim:#4a3fa0;--green:#3ecf8e;--red:#f87171;
      --yellow:#fbbf24;--text:#e2e2e9;--dim:#6e6e80;--muted:#3d3d4e;
      --r:8px;--mono:'Cascadia Code','Fira Code',Consolas,monospace;
      --ui:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--ui);height:100vh;overflow:hidden;display:flex;flex-direction:column}

    /* ── Titlebar ── */
    .tb{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:10px;min-height:46px}
    .tb-l{display:flex;align-items:center;gap:8px;min-width:0}
    .tb-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .logo{font-weight:700;font-size:15px;flex-shrink:0}.logo span{color:var(--accent)}
    .ftab{font-size:12px;color:var(--dim);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 9px;cursor:pointer;outline:none;font-family:var(--ui);max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    input.ftab:focus{border-color:var(--accent);color:var(--text)}
    .bbadge{display:flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid;font-weight:600;flex-shrink:0;cursor:pointer}
    .dirty{width:7px;height:7px;border-radius:50%;background:var(--yellow);flex-shrink:0}

    /* ── Project dropdown ── */
    .pdrop{position:absolute;top:calc(100% + 4px);left:0;min-width:180px;max-width:260px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:10;padding:4px;max-height:320px;overflow-y:auto}
    .pitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 9px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text)}
    .pitem:hover{background:var(--surface)}
    .pitem.cur{color:var(--accent);font-weight:600}
    .pname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pdel{color:var(--muted);font-size:10px;flex-shrink:0}
    .pdel:hover{color:var(--red)}
    .pnew{padding:6px 9px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--accent);font-weight:600;border-top:1px solid var(--border);margin-top:4px;padding-top:8px}
    .pnew:hover{background:var(--surface)}

    /* ── Buttons ── */
    .btn{font-family:var(--ui);font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:var(--r);padding:5px 11px;cursor:pointer;transition:background .15s,border-color .15s,color .15s;white-space:nowrap;line-height:1}
    .btn:disabled{opacity:.4;cursor:default}
    .ghost{background:transparent;color:var(--dim)}.ghost:hover:not(:disabled){background:var(--surface2);color:var(--text);border-color:var(--muted)}
    .success{background:var(--green);color:#0a1f14;border-color:var(--green);font-weight:700}.success:hover:not(:disabled){background:#50e0a1}
    .accent{background:var(--accent);color:#fff;border-color:var(--accent)}.accent:hover:not(:disabled){background:#8d7ef8}
    .danger{background:transparent;color:var(--red);border-color:#5a1e1e}.danger:hover:not(:disabled){background:#3b1e1e;border-color:var(--red)}
    .sm{padding:3px 8px;font-size:11px}.xs{padding:2px 6px;font-size:10px;border-radius:4px}

    /* ── Layout ── */
    .ws{display:flex;flex:1;overflow:hidden}

    /* ── Tree panel ── */
    .tree-panel{width:270px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
    .tree-panel.closed{width:0;border:none}
    .ph{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .ptitle{font-size:11px;font-weight:600;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
    .tree-scroll{flex:1;overflow:auto}
    .tree-scroll::-webkit-scrollbar{width:4px;height:4px}
    .tree-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* ── Editor ── */
    .ep{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .etb{padding:7px 14px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:12px}
    .sep{width:1px;height:14px;background:var(--border)}
    .wc{margin-left:auto;font-size:11px;color:var(--muted)}
    .lnchk{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);cursor:pointer;user-select:none}
    .lnchk input{cursor:pointer}
    .editor-wrap{flex:1;display:flex;overflow:hidden;min-height:0}
    .gutter{flex-shrink:0;overflow:hidden;background:var(--bg);border-right:1px solid var(--border);font-family:var(--mono);font-size:14px;line-height:1.75;color:var(--muted);text-align:right;padding:20px 10px 20px 16px;-webkit-user-select:none;user-select:none}
    textarea{flex:1;min-width:0;background:var(--bg);color:var(--text);border:none;outline:none;resize:none;font-family:var(--mono);font-size:14px;line-height:1.75;padding:20px 24px;tab-size:2}
    textarea::placeholder{color:var(--muted)}
    textarea.viewing{background:#13131a;color:var(--dim)}

    .chash{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600}
    .sc{padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700}
    .sc-a{background:#0d2b1c;color:var(--green)}.sc-d{background:#2b0d0d;color:var(--red)}

    /* ── History panel ── */
    .dp{width:280px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
    .hist-list{flex:1;overflow-y:auto;padding:8px}
    .hist-list::-webkit-scrollbar{width:4px}.hist-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .hitem{border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s,background .15s}
    .hitem:hover{border-color:var(--muted);background:var(--surface2)}
    .hitem.active{border-color:var(--accent);background:#1c1a2e}
    .hhash{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:3px}
    .hmsg{font-size:12px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hmeta{font-size:10px;color:var(--muted);display:flex;gap:8px;align-items:center}

    /* ── Modal ── */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .modal h2{font-size:16px;margin-bottom:3px}.msub{font-size:12px;color:var(--dim);margin-bottom:14px}
    .fl{font-size:12px;color:var(--dim);display:block;margin-bottom:5px}
    .fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--ui);font-size:13px;padding:8px 12px;outline:none;transition:border-color .15s;margin-bottom:12px}
    .fi:focus{border-color:var(--accent)}.fta{resize:none;height:68px;font-family:var(--ui)}
    .ma{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
    .crow{display:flex;gap:8px;margin-bottom:14px;align-items:center}
    .csw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
    .csw.sel{border-color:white;transform:scale(1.2)}.csw:hover{transform:scale(1.15)}

    /* ── Empty / Toast ── */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;gap:6px;color:var(--muted);font-size:12px;text-align:center;padding:20px}
    .ei{font-size:30px;margin-bottom:4px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:12px;z-index:200;animation:tin .2s ease;pointer-events:none}
    @keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    .node-g{cursor:pointer}
    .node-g:hover .nhover{opacity:1 !important}
    .node-g:hover .ndel{opacity:1 !important}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const PALETTE = ['#7c6af7','#3ecf8e','#f59e0b','#60a5fa','#f87171','#a78bfa','#34d399','#fb923c','#e879f9','#2dd4bf'];
const LW = 120, LH = 92, NR = 10, TP = 40;
const KEY = 'evolutionpad_v3';
const OLD_KEY = 'evolutionpad_v2';

// ── Utils ───────────────────────────────────────────────────────
function h7(s) {
  let h = 0x811c9dc5;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = (h * 0x01000193) >>> 0; }
  return h.toString(16).padStart(7,'0').slice(0,7);
}
function ago(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now'; if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`; return `${Math.floor(s/86400)}d ago`;
}
function wc(t){ return t.trim() ? t.trim().split(/\s+/).length : 0; }

// ── Diff ────────────────────────────────────────────────────────
function diffLines(a,b){
  const al=a===''?[]:a.split('\n'), bl=b===''?[]:b.split('\n');
  const m=al.length,n=bl.length;
  const dp=Array.from({length:m+1},()=>new Int32Array(n+1));
  for(let i=m-1;i>=0;i--) for(let j=n-1;j>=0;j--)
    dp[i][j]=al[i]===bl[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  const ops=[];let i=0,j=0;
  while(i<m||j<n){
    if(i<m&&j<n&&al[i]===bl[j]){ops.push({type:'ctx',line:al[i],ai:i+1,bi:j+1});i++;j++;}
    else if(j<n&&(i>=m||dp[i+1][j]>=dp[i][j+1])){ops.push({type:'add',line:bl[j],bi:j+1});j++;}
    else{ops.push({type:'del',line:al[i],ai:i+1});i++;}
  }
  return ops;
}
function dStats(ops){ return ops.reduce((a,o)=>({add:a.add+(o.type==='add'?1:0),del:a.del+(o.type==='del'?1:0)}),{add:0,del:0}); }

// ── Storage ──────────────────────────────────────────────────────
function emptyFile(){
  const id='root';
  return{nodes:{[id]:{id,name:'Original',color:PALETTE[0],parent:null,parentCommit:null,commits:[],workingCopy:'',createdAt:Date.now()}},rootId:id,currentId:id};
}

// Convert a v2 (branch-based) file into the v3 (node-based) shape
function migrateFileV2(f){
  const nodes={};
  Object.entries(f.branches||{}).forEach(([bname,b])=>{
    const cs=Object.values(f.commits||{}).filter(c=>c.branch===bname).sort((a,b2)=>a.timestamp-b2.timestamp);
    let parent=null,parentCommit=null;
    if(b.from){
      const pc=(f.commits||{})[b.from];
      if(pc&&pc.branch!==bname){parentCommit=b.from;parent=pc.branch;}
    }
    nodes[bname]={
      id:bname,name:bname,color:b.color||PALETTE[0],parent,parentCommit,
      commits:cs.map(c=>({id:c.id,message:c.message,description:c.description||'',snapshot:c.snapshot,timestamp:c.timestamp})),
      workingCopy: bname===f.currentBranch?(f.workingCopy||''):(cs.length?cs[cs.length-1].snapshot:''),
      createdAt:b.createdAt||Date.now(),
    };
  });
  if(!Object.keys(nodes).length) return emptyFile();
  const rootId=Object.keys(nodes).find(id=>!nodes[id].parent)||Object.keys(nodes)[0];
  return {nodes,rootId,currentId:(f.currentBranch&&nodes[f.currentBranch])?f.currentBranch:rootId};
}

function migrateStoreV2(v2){
  const files={};
  Object.entries(v2.files||{}).forEach(([fname,f])=>{files[fname]=migrateFileV2(f);});
  return {files: Object.keys(files).length?files:{Untitled:emptyFile()}};
}

function load(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch{}
  try{const old=localStorage.getItem(OLD_KEY);if(old)return migrateStoreV2(JSON.parse(old));}catch{}
  return{files:{Untitled:emptyFile()}};
}
function save(s){localStorage.setItem(KEY,JSON.stringify(s));}

// ── Tree layout (Reingold-Tilford style) ─────────────────────────
function layout(nodes){
  const ids=Object.keys(nodes);
  if(!ids.length) return {};
  const ch={};
  ids.forEach(id=>{ch[id]=[];});
  ids.forEach(id=>{const p=nodes[id].parent;if(p&&nodes[p])ch[p].push(id);});
  const roots=ids.filter(id=>!nodes[id].parent||!nodes[nodes[id].parent])
    .sort((a,b)=>nodes[a].createdAt-nodes[b].createdAt);
  const pos={};
  let lx=0;
  function ax(id){
    const kids=[...ch[id]].sort((a,b)=>nodes[a].createdAt-nodes[b].createdAt);
    if(!kids.length){pos[id]={x:lx++};return;}
    kids.forEach(ax);
    const xs=kids.map(k=>pos[k].x);
    pos[id]={x:(xs[0]+xs[xs.length-1])/2};
  }
  function ay(id,d,vis=new Set()){
    if(vis.has(id))return;vis.add(id);
    if(!pos[id])pos[id]={};
    pos[id].y=d;
    ch[id].forEach(k=>ay(k,d+1,vis));
  }
  roots.forEach((r,i)=>{if(i>0)lx+=0.4;ax(r);ay(r,0);});
  ids.forEach(id=>{if(!pos[id])pos[id]={x:lx++,y:0};if(pos[id].y===undefined)pos[id].y=0;});
  return pos;
}

// ── Tree SVG (each node = a variant with its own history) ─────────
function TreeSVG({nodes,currentId,onSelect,onDelete}){
  const pos=useMemo(()=>layout(nodes),[nodes]);
  const ids=Object.keys(nodes);
  const allX=Object.values(pos).map(p=>p.x), allY=Object.values(pos).map(p=>p.y);
  const maxX=Math.max(...allX), maxY=Math.max(...allY);
  const svgW=(maxX+1)*LW+TP*2;
  const svgH=(maxY+1)*LH+TP*2+20;
  const px=id=>pos[id]?.x*LW+TP;
  const py=id=>pos[id]?.y*LH+TP+20;
  const childCount={};
  ids.forEach(id=>{const p=nodes[id].parent;if(p)childCount[p]=(childCount[p]||0)+1;});
  return(
    <svg width={svgW} height={svgH} style={{display:'block',minWidth:svgW}}>
      {/* Edges */}
      {ids.map(id=>{
        const n=nodes[id];
        if(!n.parent||!nodes[n.parent])return null;
        const x1=px(n.parent),y1=py(n.parent),x2=px(id),y2=py(id);
        const mid=(y1+y2)/2;
        return <path key={'e'+id} d={`M${x1},${y1+NR} C${x1},${mid} ${x2},${mid} ${x2},${y2-NR}`}
          fill="none" stroke={n.color} strokeWidth={2} strokeOpacity={0.45}/>;
      })}
      {/* Nodes */}
      {ids.map(id=>{
        const n=nodes[id];
        const x=px(id),y=py(id);
        const isCur=id===currentId;
        const isLeaf=!childCount[id];
        return(
          <g key={id} className="node-g" onClick={()=>onSelect(id)}>
            {/* Glow ring for current variant */}
            {isCur&&<circle cx={x} cy={y} r={NR+8} fill={n.color} opacity={0.12}/>}
            {isCur&&<circle cx={x} cy={y} r={NR+5} fill="none" stroke={n.color} strokeWidth={1.5} strokeDasharray="4 3" opacity={0.55}/>}
            {/* Hover ring */}
            <circle className="nhover" cx={x} cy={y} r={NR+4} fill="none" stroke={n.color} strokeWidth={1} opacity={0} style={{transition:'opacity .15s'}}/>
            {/* Circle */}
            <circle cx={x} cy={y} r={NR} fill={isCur?n.color:'#17171a'} stroke={n.color} strokeWidth={2}/>
            {isCur&&<circle cx={x} cy={y} r={3.5} fill="#fff"/>}
            {/* Variant name above */}
            <text x={x} y={y-NR-10} textAnchor="middle" fontSize={11} fill={n.color} fontFamily="sans-serif" fontWeight="700">{n.name}</text>
            {/* Commit count below */}
            <text x={x} y={y+NR+14} textAnchor="middle" fontSize={9} fill="var(--muted)" fontFamily="monospace">
              {n.commits.length} commit{n.commits.length!==1?'s':''}
            </text>
            {/* Delete control for non-current leaf variants */}
            {!isCur&&isLeaf&&Object.keys(nodes).length>1&&(
              <g className="ndel" style={{opacity:0,transition:'opacity .15s'}}
                onClick={e=>{e.stopPropagation();onDelete(id);}}>
                <circle cx={x+NR+3} cy={y-NR-3} r={7} fill="#2b0d0d" stroke="var(--red)" strokeWidth={1}/>
                <text x={x+NR+3} y={y-NR} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill="var(--red)" fontWeight="bold">✕</text>
              </g>
            )}
          </g>
        );
      })}
    </svg>
  );
}

// ── App ──────────────────────────────────────────────────────────
function App(){
  const [store,setStore]=useState(load);
  const [af,setAf]=useState(()=>Object.keys(load().files)[0]||'Untitled');
  const [viewCommitId,setViewCommitId]=useState(null);
  const [showTree,setShowTree]=useState(true);
  const [cModal,setCModal]=useState(false);
  const [eModal,setEModal]=useState(false);
  const [eFrom,setEFrom]=useState(null); // commit id, or null = current draft
  const [cMsg,setCMsg]=useState('');
  const [cDesc,setCDesc]=useState('');
  const [eName,setEName]=useState('');
  const [eColor,setEColor]=useState(PALETTE[1]);
  const [renaming,setRenaming]=useState(false);
  const [newName,setNewName]=useState('');
  const [renamingNode,setRenamingNode]=useState(false);
  const [newNodeName,setNewNodeName]=useState('');
  const [showProjects,setShowProjects]=useState(false);
  const [npModal,setNpModal]=useState(false);
  const [npName,setNpName]=useState('');
  const [toast,setToast]=useState(null);
  const [showLines,setShowLines]=useState(true);
  const ttimer=useRef(null);
  const taRef=useRef(null);
  const gutterRef=useRef(null);

  function syncGutterScroll(){
    if(gutterRef.current&&taRef.current) gutterRef.current.scrollTop=taRef.current.scrollTop;
  }

  useEffect(()=>{
    setStore(p=>{if(!p.files[af])return{...p,files:{...p.files,[af]:emptyFile()}};return p;});
  },[]);
  useEffect(()=>{save(store);},[store]);

  const file=store.files[af]||emptyFile();
  const {nodes,currentId}=file;
  const node=nodes[currentId]||nodes[file.rootId];
  const history=node.commits;
  const headC=history.length?history[history.length-1]:null;
  const isDirty=headC?node.workingCopy!==headC.snapshot:node.workingCopy!=='';
  const viewCommit=viewCommitId?history.find(c=>c.id===viewCommitId):null;

  function upd(fn){setStore(p=>({...p,files:{...p.files,[af]:fn(p.files[af]||emptyFile())}}));}
  function msg(m){setToast(m);clearTimeout(ttimer.current);ttimer.current=setTimeout(()=>setToast(null),2200);}

  function doCommit(){
    if(!cMsg.trim())return;
    const id=h7(node.workingCopy+Date.now());
    const commit={id,message:cMsg.trim(),description:cDesc.trim(),snapshot:node.workingCopy,timestamp:Date.now()};
    upd(f=>{const n=f.nodes[f.currentId];return{...f,nodes:{...f.nodes,[f.currentId]:{...n,commits:[...n.commits,commit]}}};});
    setCModal(false);setCMsg('');setCDesc('');
    msg(`Committed to "${node.name}"`);
  }

  function doEvolve(){
    const name=eName.trim();
    if(!name)return;
    const source=eFrom!=null?history.find(c=>c.id===eFrom):null;
    const snapshot=source?source.snapshot:node.workingCopy;
    const parentCommit=source?source.id:(headC?.id||null);
    const id=h7(name+Date.now());
    const newNode={id,name,color:eColor,parent:currentId,parentCommit,commits:[],workingCopy:snapshot,createdAt:Date.now()};
    upd(f=>({...f,nodes:{...f.nodes,[id]:newNode},currentId:id}));
    setEModal(false);setEName('');setViewCommitId(null);
    msg(`Created variant "${name}"`);
  }

  function doDelCommit(commitId){
    if(!confirm('Delete this commit?'))return;
    upd(f=>{const n=f.nodes[f.currentId];return{...f,nodes:{...f.nodes,[f.currentId]:{...n,commits:n.commits.filter(c=>c.id!==commitId)}}};});
    if(viewCommitId===commitId)setViewCommitId(null);
    msg('Commit deleted');
  }

  function doDeleteVariant(id){
    if(id===currentId){msg("Switch away before deleting this variant");return;}
    if(!confirm(`Delete variant "${nodes[id].name}"?`))return;
    upd(f=>{const nn={...f.nodes};delete nn[id];return{...f,nodes:nn};});
    msg('Variant deleted');
  }

  function selectVariant(id){
    if(id===currentId)return;
    upd(f=>({...f,currentId:id}));
    setViewCommitId(null);
  }

  function doRenameNode(){
    const name=newNodeName.trim();
    if(!name){setRenamingNode(false);return;}
    upd(f=>({...f,nodes:{...f.nodes,[f.currentId]:{...f.nodes[f.currentId],name}}}));
    setRenamingNode(false);
    msg(`Renamed to "${name}"`);
  }

  function doRename(){
    const name=newName.trim();
    if(!name||name===af){setRenaming(false);return;}
    setStore(p=>{const fs={...p.files};fs[name]=fs[af];delete fs[af];return{...p,files:fs};});
    setAf(name);setRenaming(false);msg(`Renamed to "${name}"`);
  }

  function doNewProject(){
    let name=npName.trim()||'Untitled';
    let final=name,i=2;
    while(store.files[final]) final=`${name} ${i++}`;
    setStore(p=>({...p,files:{...p.files,[final]:emptyFile()}}));
    setAf(final);setViewCommitId(null);setNpModal(false);setNpName('');setShowProjects(false);
    msg(`Created project "${final}"`);
  }

  function doSwitchProject(name){
    if(name===af)return;
    setAf(name);setViewCommitId(null);setShowProjects(false);
  }

  function doDeleteProject(name){
    if(Object.keys(store.files).length<=1){msg("Can't delete the only project");return;}
    if(!confirm(`Delete project "${name}"? This cannot be undone.`))return;
    setStore(p=>{const fs={...p.files};delete fs[name];return{...p,files:fs};});
    if(name===af){
      const remaining=Object.keys(store.files).filter(n=>n!==name);
      setAf(remaining[0]);setViewCommitId(null);
    }
    msg(`Deleted "${name}"`);
  }

  function doExport(){
    const data=JSON.stringify({file:af,...file},null,2);
    const url=URL.createObjectURL(new Blob([data],{type:'application/json'}));
    const a=document.createElement('a');a.href=url;a.download=`${af.replace(/\s+/g,'_')}_evolution.json`;a.click();URL.revokeObjectURL(url);
    msg('Exported');
  }

  function doImport(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        const fname=d.file||af;
        let fileData;
        if(d.nodes) fileData={nodes:d.nodes,rootId:d.rootId,currentId:(d.currentId&&d.nodes[d.currentId])?d.currentId:d.rootId};
        else if(d.branches) fileData=migrateFileV2(d);
        else fileData=emptyFile();
        setStore(p=>({...p,files:{...p.files,[fname]:fileData}}));
        setAf(fname);setViewCommitId(null);msg(`Imported "${fname}"`);
      }catch{msg('Invalid file');}
    };
    r.readAsText(f);e.target.value='';
  }

  const pendStats=useMemo(()=>{
    if(!isDirty)return null;
    return dStats(diffLines(headC?.snapshot||'',node.workingCopy));
  },[isDirty,headC,node.workingCopy]);

  const usedColors=new Set(Object.values(nodes).map(n=>n.color));
  const nextColor=PALETTE.find(c=>!usedColors.has(c))||PALETTE[1];

  return<>
    {/* Titlebar */}
    <div className="tb">
      <div className="tb-l">
        <span className="logo">Evolution<span>Pad</span></span>
        {renaming
          ?<input className="ftab" style={{width:130}} autoFocus value={newName}
              onChange={e=>setNewName(e.target.value)}
              onBlur={doRename}
              onKeyDown={e=>{if(e.key==='Enter')doRename();if(e.key==='Escape')setRenaming(false);}}
            />
          :<span className="ftab" title="Click to rename" onClick={()=>{setNewName(af);setRenaming(true);}}>{af}</span>
        }
        <div style={{position:'relative'}}>
          <button className="btn ghost sm" onClick={()=>setShowProjects(v=>!v)} title="Switch project">
            {Object.keys(store.files).length} project{Object.keys(store.files).length!==1?'s':''} ▾
          </button>
          {showProjects&&(
            <>
              <div style={{position:'fixed',inset:0,zIndex:9}} onClick={()=>setShowProjects(false)}/>
              <div className="pdrop">
                {Object.keys(store.files).map(name=>(
                  <div key={name} className={`pitem ${name===af?'cur':''}`} onClick={()=>doSwitchProject(name)}>
                    <span className="pname">{name}</span>
                    {Object.keys(store.files).length>1&&(
                      <span className="pdel" title={`Delete ${name}`} onClick={e=>{e.stopPropagation();doDeleteProject(name);}}>✕</span>
                    )}
                  </div>
                ))}
                <div className="pnew" onClick={()=>{setNpName('');setNpModal(true);setShowProjects(false);}}>+ New Project</div>
              </div>
            </>
          )}
        </div>
        {renamingNode
          ?<input className="ftab" style={{width:120,borderColor:node.color}} autoFocus value={newNodeName}
              onChange={e=>setNewNodeName(e.target.value)}
              onBlur={doRenameNode}
              onKeyDown={e=>{if(e.key==='Enter')doRenameNode();if(e.key==='Escape')setRenamingNode(false);}}
            />
          :<div className="bbadge" title="Click to rename this variant"
              style={{color:node.color,borderColor:`${node.color}70`,background:`${node.color}15`}}
              onClick={()=>{setNewNodeName(node.name);setRenamingNode(true);}}>
              🧬 {node.name}
            </div>
        }
        {isDirty&&<span className="dirty" title="Uncommitted changes"/>}
      </div>
      <div className="tb-r">
        <button className="btn ghost" onClick={()=>setShowTree(v=>!v)}>{showTree?'Hide Tree':'🌳 Tree'}</button>
        <label className="btn ghost" style={{cursor:'pointer'}}>
          Import<input type="file" accept=".json" style={{display:'none'}} onChange={doImport}/>
        </label>
        <button className="btn ghost" onClick={doExport}>Export</button>
        <button className="btn success" disabled={!isDirty} onClick={()=>setCModal(true)}>+ Commit</button>
      </div>
    </div>

    {/* Workspace */}
    <div className="ws">

      {/* Tree Panel */}
      <div className={`tree-panel ${showTree?'':'closed'}`}>
        <div className="ph">
          <span className="ptitle">Evolution Tree</span>
          <span style={{fontSize:11,color:'var(--muted)'}}>{Object.keys(nodes).length} variant{Object.keys(nodes).length!==1?'s':''}</span>
        </div>
        <div className="tree-scroll">
          <TreeSVG nodes={nodes} currentId={currentId} onSelect={selectVariant} onDelete={doDeleteVariant}/>
        </div>
      </div>

      {/* Editor */}
      <div className="ep">
        <div className="etb">
          {viewCommit ? <>
            <span className="chash">{viewCommit.id}</span>
            <span style={{fontSize:12,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{viewCommit.message}</span>
            <span style={{fontSize:11,color:'var(--muted)'}}>{ago(viewCommit.timestamp)}</span>
            <span className="sep"/>
            <button className="btn accent xs" onClick={()=>{setEFrom(viewCommit.id);setEColor(nextColor);setEName('');setEModal(true);}}>🌿 Evolve from here</button>
            <button className="btn danger xs" onClick={()=>doDelCommit(viewCommit.id)}>Delete</button>
            <button className="btn ghost xs" onClick={()=>setViewCommitId(null)}>← Back to editing</button>
            <span className="wc">viewing snapshot (read-only)</span>
          </> : <>
            <span style={{color:node.color,fontWeight:700}}>{node.name}</span>
            <span className="sep"/>
            <span style={{color:'var(--dim)'}}>{history.length} commit{history.length!==1?'s':''}</span>
            {headC&&<><span className="sep"/><span style={{color:'var(--muted)',fontFamily:'var(--mono)',fontSize:11}}>{headC.id}</span><span style={{color:'var(--muted)',fontSize:11,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{headC.message}</span></>}
            {isDirty&&pendStats&&<><span className="sep"/><span style={{color:'var(--green)',fontSize:11}}>+{pendStats.add}</span><span style={{color:'var(--red)',fontSize:11}}>-{pendStats.del}</span></>}
            <span className="sep"/>
            <button className="btn accent xs" onClick={()=>{setEFrom(null);setEColor(nextColor);setEName('');setEModal(true);}}>🌿 New Variant</button>
            <span className="wc">{wc(node.workingCopy)} words · {node.workingCopy.length} chars</span>
          </>}
          <label className="lnchk" style={{marginLeft:viewCommit?'auto':0}}>
            <input type="checkbox" checked={showLines} onChange={e=>setShowLines(e.target.checked)}/>
            Line numbers
          </label>
        </div>
        <div className="editor-wrap">
          {showLines&&(
            <div className="gutter" ref={gutterRef}>
              {(viewCommit?viewCommit.snapshot:node.workingCopy).split('\n').map((_,i)=><div key={i}>{i+1}</div>)}
            </div>
          )}
          <textarea
            ref={taRef}
            className={viewCommit?'viewing':''}
            value={viewCommit?viewCommit.snapshot:node.workingCopy}
            onChange={e=>!viewCommit&&upd(f=>({...f,nodes:{...f.nodes,[f.currentId]:{...f.nodes[f.currentId],workingCopy:e.target.value}}}))}
            onScroll={syncGutterScroll}
            readOnly={!!viewCommit}
            placeholder={`Writing in variant "${node.name}"…\n\nTip: click + Commit to save a version to this variant's history, or "New Variant" to evolve a fresh branch from this point.`}
            spellCheck={true}
          />
        </div>
      </div>

      {/* History Panel */}
      <div className="dp">
        <div className="ph">
          <span className="ptitle">{node.name} History</span>
          <span style={{fontSize:11,color:'var(--muted)'}}>{history.length}</span>
        </div>
        <div className="hist-list">
          {history.length===0&&(
            <div className="empty" style={{height:160}}>
              <div className="ei">📜</div>
              <div>No commits yet for this variant.</div>
            </div>
          )}
          {[...history].reverse().map((c,idx)=>{
            const prevSnap=history[history.length-2-idx]?.snapshot ?? '';
            const stats=dStats(diffLines(prevSnap,c.snapshot));
            return(
              <div key={c.id} className={`hitem ${viewCommitId===c.id?'active':''}`}
                onClick={()=>setViewCommitId(prev=>prev===c.id?null:c.id)}>
                <div className="hhash">{c.id}</div>
                <div className="hmsg" title={c.description||c.message}>{c.message}</div>
                <div className="hmeta">
                  <span>{ago(c.timestamp)}</span>
                  <span className="sc sc-a">+{stats.add}</span>
                  <span className="sc sc-d">-{stats.del}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>

    {/* Commit Modal */}
    {cModal&&(
      <div className="ov" onClick={e=>e.target===e.currentTarget&&setCModal(false)}>
        <div className="modal">
          <h2>New Commit</h2>
          <div className="msub">Snapshot in variant <strong style={{color:node.color}}>{node.name}</strong></div>
          {pendStats&&<div style={{display:'flex',gap:8,marginBottom:14}}>
            <span className="sc sc-a" style={{fontSize:11,padding:'3px 10px'}}>+{pendStats.add} added</span>
            <span className="sc sc-d" style={{fontSize:11,padding:'3px 10px'}}>-{pendStats.del} removed</span>
          </div>}
          <label className="fl">Commit message *</label>
          <input className="fi" autoFocus placeholder="Describe this snapshot…"
            value={cMsg} onChange={e=>setCMsg(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&doCommit()}/>
          <label className="fl">Description (optional)</label>
          <textarea className="fi fta" placeholder="Add more context…"
            value={cDesc} onChange={e=>setCDesc(e.target.value)}/>
          <div className="ma">
            <button className="btn ghost" onClick={()=>setCModal(false)}>Cancel</button>
            <button className="btn success" disabled={!cMsg.trim()} onClick={doCommit}>Commit snapshot</button>
          </div>
        </div>
      </div>
    )}

    {/* Evolve Modal */}
    {eModal&&(
      <div className="ov" onClick={e=>e.target===e.currentTarget&&setEModal(false)}>
        <div className="modal">
          <h2>🌿 New Variant</h2>
          <div className="msub">
            {eFrom!=null
              ?<>Branching off from commit <strong style={{fontFamily:'monospace',color:'var(--accent)'}}>{eFrom}</strong>{history.find(c=>c.id===eFrom)&&<span> — "{history.find(c=>c.id===eFrom).message}"</span>}</>
              :<>Branching off from the current draft of <strong style={{color:node.color}}>{node.name}</strong></>
            }
          </div>
          <label className="fl">Variant name *</label>
          <input className="fi" autoFocus placeholder="e.g. draft-v2, chapter-3, dark-ending…"
            value={eName} onChange={e=>setEName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&doEvolve()}/>
          <label className="fl">Variant colour</label>
          <div className="crow">
            {PALETTE.map(c=>(
              <div key={c} className={`csw ${eColor===c?'sel':''}`} style={{background:c}} onClick={()=>setEColor(c)} title={c}/>
            ))}
          </div>
          <div className="ma">
            <button className="btn ghost" onClick={()=>setEModal(false)}>Cancel</button>
            <button className="btn accent" disabled={!eName.trim()} onClick={doEvolve}>Create variant</button>
          </div>
        </div>
      </div>
    )}

    {/* New Project Modal */}
    {npModal&&(
      <div className="ov" onClick={e=>e.target===e.currentTarget&&setNpModal(false)}>
        <div className="modal">
          <h2>New Project</h2>
          <div className="msub">Starts a fresh notepad with its own evolution tree.</div>
          <label className="fl">Project name</label>
          <input className="fi" autoFocus placeholder="e.g. Novel Draft, Blog Post…"
            value={npName} onChange={e=>setNpName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&doNewProject()}/>
          <div className="ma">
            <button className="btn ghost" onClick={()=>setNpModal(false)}>Cancel</button>
            <button className="btn accent" onClick={doNewProject}>Create</button>
          </div>
        </div>
      </div>
    )}

    {toast&&<div className="toast">{toast}</div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
